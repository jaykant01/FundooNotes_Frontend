<div class="page-wrapper">
  <div class="card">

    <!-- Google Logo -->
    <div class="logo">
      <h3>Fundoo Notesservice</h3>
    </div>

    <h1 class="title">Sign In</h1>
    <p class="subtitle">Use your Google Account</p>

    <form #signinForm="ngForm" (ngSubmit)="onSubmit(signinForm)" novalidate>

      <!-- Email field -->
      <div class="field-wrap"
           [class.focused]="emailFocused"
           [class.error]="emailRef.invalid && (emailRef.touched || submitted())">
        <label for="email" class="field-label"
               [class.active]="model.email || emailFocused">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          class="field-input"
          [(ngModel)]="model.email"
          #emailRef="ngModel"
          required
          email
          autocomplete="email"
          (focus)="emailFocused = true"
          (blur)="emailFocused = false"
        />
        <span class="error-msg"
              *ngIf="emailRef.errors?.['required'] && (emailRef.touched || submitted())">
          Enter an email
        </span>
        <span class="error-msg"
              *ngIf="emailRef.errors?.['email'] && emailRef.touched">
          Enter a valid email address
        </span>
      </div>

      <!-- Password field -->
      <div class="field-wrap"
           [class.focused]="passwordFocused"
           [class.error]="passwordRef.invalid && (passwordRef.touched || submitted())">
        <label for="password" class="field-label"
               [class.active]="model.password || passwordFocused">Password</label>
        <input
          id="password"
          [type]="showPassword() ? 'text' : 'password'"
          name="password"
          class="field-input"
          [(ngModel)]="model.password"
          #passwordRef="ngModel"
          required
          minlength="8"
          autocomplete="current-password"
          (focus)="passwordFocused = true"
          (blur)="passwordFocused = false"
        />
        <button type="button" class="eye-btn" (click)="togglePassword()" tabindex="-1">
          <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <span class="error-msg"
              *ngIf="passwordRef.invalid && (passwordRef.touched || submitted())">
          Enter a password
        </span>
      </div>

      <!-- Forgot password -->
      <div class="forgot-wrap">
        <button type="button" class="link-btn" (click)="onForgotPassword()">Forgot password?</button>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" routerLink='/register' class="link-btn" (click)="onCreateAccount()">Create account</button>
        <button type="submit" class="btn-signin">Sign In</button>
      </div>

    </form>
  </div>

</div>
